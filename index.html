      <h2>How we work — Client Value Delivery Framework</h2>
      <p>A 4-phase framework — Discover, Design, Build, Activate — each closing with a decision gate to protect the client's investment.</p>
      <ol>
        <li>Discover — Problem Brief, Assessment Report, and business value case.</li>
        <li>Design — Solution Blueprint, KPIs, and governance plan.</li>
        <li>Build — MVP/pilot in short sprints with CI/CD and MLOps; multidimensional validation and go/no-go.</li>
        <li>Activate — go-live with change management and hypercare; ongoing support, metrics, and evolutionary roadmap.</li>
      </ol>
      <p>Cross-cutting layer: governance, security, responsible AI, and change management applied across every phase. Service modalities: Advisory Sprint (1–2 weeks), Pilot / MVP Build (4–8 weeks), Implementation &amp; Scale (8–16+ weeks).</p>
